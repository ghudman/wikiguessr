<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wiki Number Daily</title>

<style>
body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #0b0f19;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
}

.card {
    width: 92%;
    max-width: 650px;
    background: #111827;
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    transform: scale(1);
    transition: transform 0.25s ease, opacity 0.25s ease;
}

.card.pop {
    transform: scale(1.03);
}

.card.fade {
    opacity: 0;
    transform: translateY(20px);
}

h1 {
    margin: 0;
    font-size: 1.5rem;
    color: #38bdf8;
}

.sub {
    color: #94a3b8;
    font-size: 0.85rem;
    margin-bottom: 10px;
}

.stats {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    margin: 10px 0;
}

.box {
    background: #0f172a;
    padding: 14px;
    border-radius: 12px;
    margin: 12px 0;
    line-height: 1.6;
    text-align: left;
}

.blank {
    background: #334155;
    padding: 2px 8px;
    border-radius: 6px;
    color: #fbbf24;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 1.05rem;
    border-radius: 10px;
    border: none;
    background: #0f172a;
    color: white;
    text-align: center;
}

.feedback {
    min-height: 22px;
    margin-top: 8px;
    font-weight: bold;
    text-align: center;
}

.hint {
    font-size: 0.85rem;
    color: #94a3b8;
    margin-top: 6px;
    text-align: center;
}
</style>
</head>

<body>

<div class="card" id="card">
    <h1>📱 Wiki Daily Number</h1>
    <div class="sub">Tap / Swipe / Enter to play</div>

    <div class="stats">
        <div>🔥 Streak: <span id="streak">0</span></div>
        <div>🏆 Best: <span id="best">0</span></div>
    </div>

    <div class="box">
        <div id="title">Loading...</div>
        <hr style="border:1px solid #1f2937;">
        <div id="clue">Loading Wikipedia...</div>
    </div>

    <input id="guess" type="number" placeholder="Guess the number..." />

    <div class="feedback" id="feedback"></div>
    <div class="hint" id="hint"></div>
</div>

<script>
let targetNumber = 0;
let streak = 0;
let best = localStorage.getItem("best_streak") || 0;

document.getElementById("best").textContent = best;

/* -------------------------
   DAILY CHALLENGE (NO BACKEND)
------------------------- */

function getDailySeed() {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

/* -------------------------
   WIKI ENGINE
------------------------- */

async function fetchWiki() {
    const res = await fetch(
        "https://en.wikipedia.org/api/rest_v1/page/random/summary",
        { cache: "no-store" }
    );
    return await res.json();
}

function extractNumbers(text) {
    const nums = text.match(/\b\d{1,6}\b/g);
    if (!nums) return [];

    return nums.map(n => parseInt(n)).filter(n => n >= 10);
}

/* smart pick */
function score(n) {
    let s = 0;
    if (n >= 1800 && n <= 2100) s += 100;
    if (n >= 10 && n < 100000) s += 20;
    return s;
}

function pick(nums) {
    const sorted = nums.sort((a,b)=>score(b)-score(a));
    return sorted[Math.floor(Math.random() * Math.min(4, sorted.length))];
}

/* preload */
let buffer = [];

async function preload() {
    for (let i = 0; i < 3; i++) {
        const data = await fetchWiki();
        const nums = extractNumbers(data.extract || "");
        if (!nums.length) continue;

        const chosen = pick(nums);
        if (!chosen) continue;

        buffer.push({
            title: data.title,
            text: data.extract,
            number: chosen
        });

        if (buffer.length > 3) buffer.shift();
    }
}

/* -------------------------
   GAME FLOW
------------------------- */

const card = document.getElementById("card");

function vibrate(pattern) {
    if (navigator.vibrate) navigator.vibrate(pattern);
}

function load() {
    card.classList.add("fade");

    setTimeout(() => {
        let article = buffer.shift();
        if (!article) return setTimeout(load, 400);

        targetNumber = article.number;

        const masked = article.text.replace(
            new RegExp(`\\b${targetNumber}\\b`),
            "<span class='blank'>[ ? ]</span>"
        );

        document.getElementById("title").textContent = article.title;
        document.getElementById("clue").innerHTML = masked;

        document.getElementById("guess").value = "";
        document.getElementById("feedback").textContent = "";
        document.getElementById("hint").textContent = "";

        preload();

        card.classList.remove("fade");
        card.classList.add("pop");

        setTimeout(() => card.classList.remove("pop"), 200);
    }, 200);
}

/* -------------------------
   GAME LOGIC
------------------------- */

function updateStats() {
    document.getElementById("streak").textContent = streak;
    document.getElementById("best").textContent = best;
}

let attempts = 0;

function check() {
    const g = parseInt(document.getElementById("guess").value);
    const fb = document.getElementById("feedback");
    const hint = document.getElementById("hint");

    if (isNaN(g)) return;

    attempts++;

    const diff = Math.abs(g - targetNumber);
    const close = diff / targetNumber < 0.1;

    if (g === targetNumber) {
        streak++;
        if (streak > best) {
            best = streak;
            localStorage.setItem("best_streak", best);
        }

        fb.textContent = "🔥 Correct!";
        fb.style.color = "#22c55e";

        vibrate(150);

        updateStats();

        setTimeout(load, 600);
        return;
    }

    fb.textContent = g < targetNumber ? "📈 Higher" : "📉 Lower";
    fb.style.color = g < targetNumber ? "#38bdf8" : "#f43f5e";

    if (attempts >= 2) {
        if (targetNumber >= 1800 && targetNumber <= 2100)
            hint.textContent = "Hint: likely a YEAR 📅";
        else if (targetNumber >= 10000)
            hint.textContent = "Hint: likely a COUNT 👥";
        else
            hint.textContent = "Hint: likely a MEASUREMENT 📏";
    }

    if (close) {
        fb.textContent += " 🔥 VERY CLOSE!";
        vibrate(50);
    }
}

/* give up */
function giveUp() {
    streak = 0;
    updateStats();

    document.getElementById("feedback").textContent =
        `It was ${targetNumber}`;

    vibrate([100,50,100]);

    setTimeout(load, 800);
}

/* -------------------------
   INPUT + MOBILE CONTROLS
------------------------- */

document.getElementById("guess").addEventListener("keydown", e => {
    if (e.key === "Enter") check();
});

/* swipe to submit / skip */
let touchStartY = 0;

document.addEventListener("touchstart", e => {
    touchStartY = e.changedTouches[0].screenY;
});

document.addEventListener("touchend", e => {
    const dy = e.changedTouches[0].screenY - touchStartY;

    if (Math.abs(dy) < 30) {
        check(); // tap = submit
    } else if (dy < -80) {
        giveUp(); // swipe up = give up
    }
});

/* -------------------------
   START
------------------------- */

window.onload = async function () {
    updateStats();
    await preload();
    await preload();
    load();
};
</script>

</body>
</html>
