<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wiki Number Quest - Addictive Mode</title>

<style>
body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #0b0f19;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.card {
    width: 92%;
    max-width: 700px;
    background: #111827;
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    transition: all 0.25s ease;
}

h1 {
    margin: 0;
    font-size: 1.5rem;
    color: #38bdf8;
}

.sub {
    color: #94a3b8;
    font-size: 0.85rem;
    margin-bottom: 10px;
}

.stats {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    margin: 10px 0;
}

.box {
    background: #0f172a;
    padding: 14px;
    border-radius: 12px;
    margin: 12px 0;
    line-height: 1.6;
    text-align: left;
}

.blank {
    background: #334155;
    padding: 2px 8px;
    border-radius: 6px;
    color: #fbbf24;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 1.05rem;
    border-radius: 10px;
    border: none;
    background: #0f172a;
    color: white;
    text-align: center;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.primary { background: #38bdf8; }
.danger { background: #ef4444; color: white; }
.next { background: #22c55e; display: none; }

.feedback {
    min-height: 22px;
    margin-top: 10px;
    font-weight: bold;
    text-align: center;
}

.hint {
    font-size: 0.85rem;
    color: #94a3b8;
    margin-top: 6px;
    text-align: center;
}
</style>
</head>

<body>

<div class="card" id="card">

<h1>📱 Wiki Number Quest</h1>
<div class="sub">Addictive Mode v2 — Streaks, XP & Flow</div>

<div class="stats">
    <div>🔥 Streak: <span id="streak">0</span></div>
    <div>🏆 Best: <span id="best">0</span></div>
</div>

<div class="stats">
    <div>⭐ Level: <span id="level">1</span></div>
    <div>⚡ XP: <span id="xp">0</span></div>
</div>

<div class="box">
    <div id="title">Loading...</div>
    <hr style="border:1px solid #1f2937;">
    <div id="clue">Fetching Wikipedia...</div>
</div>

<input id="guess" type="number" placeholder="Guess the number..." />

<button class="primary" onclick="check()">Submit</button>
<button class="danger" onclick="giveUp()">Give Up</button>
<button class="next" id="nextBtn" onclick="nextRound()">Next ➜</button>

<div class="feedback" id="feedback"></div>
<div class="hint" id="hint"></div>

</div>

<script>

/* -------------------------
   STATE
------------------------- */

let targetNumber = 0;
let streak = 0;
let best = localStorage.getItem("best_streak") || 0;

let xp = 0;
let level = 1;

let attempts = 0;

document.getElementById("best").textContent = best;

/* -------------------------
   VIBRATION
------------------------- */

function vibrate(p) {
    if (navigator.vibrate) navigator.vibrate(p);
}

/* -------------------------
   WIKI ENGINE
------------------------- */

async function fetchWiki() {
    const res = await fetch(
        "https://en.wikipedia.org/api/rest_v1/page/random/summary",
        { cache: "no-store" }
    );
    return await res.json();
}

function extractNumbers(text) {
    const nums = text.match(/\b\d{1,6}\b/g);
    if (!nums) return [];
    return nums.map(n => parseInt(n)).filter(n => n >= 10);
}

/* -------------------------
   SMART PICK
------------------------- */

function score(n) {
    let s = 0;
    if (n >= 1700 && n <= 2100) s += 120;
    if (n >= 100000) s += 60;
    if (n >= 10 && n < 100000) s += 30;
    return s;
}

function pick(nums) {
    const sorted = nums.sort((a,b)=>score(b)-score(a));
    return sorted[Math.floor(Math.random() * Math.min(5, sorted.length))];
}

/* -------------------------
   PRELOAD
------------------------- */

let buffer = [];

async function preload() {
    for (let i = 0; i < 3; i++) {
        const data = await fetchWiki();
        const nums = extractNumbers(data.extract || "");
        if (!nums.length) continue;

        buffer.push({
            title: data.title,
            text: data.extract,
            number: pick(nums)
        });

        if (buffer.length > 3) buffer.shift();
    }
}

/* -------------------------
   LEVEL SYSTEM
------------------------- */

function addXP(amount) {
    xp += amount;

    if (xp >= level * 5) {
        xp = 0;
        level++;
        vibrate([50, 30, 50]);
    }

    document.getElementById("xp").textContent = xp;
    document.getElementById("level").textContent = level;
}

/* -------------------------
   GAME FLOW
------------------------- */

function load() {
    const article = buffer.shift();
    if (!article) return setTimeout(load, 300);

    targetNumber = article.number;
    attempts = 0;

    const masked = article.text.replace(
        new RegExp(`\\b${targetNumber}\\b`),
        "<span class='blank'>[ ? ]</span>"
    );

    document.getElementById("title").textContent = article.title;
    document.getElementById("clue").innerHTML = masked;

    document.getElementById("guess").value = "";
    document.getElementById("feedback").textContent = "";
    document.getElementById("hint").textContent = "";
    document.getElementById("nextBtn").style.display = "none";

    preload();
}

/* -------------------------
   HINT ENGINE
------------------------- */

function hint(n) {
    if (n >= 1700 && n <= 2100) return "📅 Year detected";
    if (n >= 100000) return "👥 Large population/count";
    if (n >= 100) return "📏 Measurement scale";
    return "🔢 General number";
}

/* -------------------------
   GAME LOGIC
------------------------- */

function updateStats() {
    document.getElementById("streak").textContent = streak;
    document.getElementById("best").textContent = best;
}

function check() {
    const g = parseInt(document.getElementById("guess").value);
    const fb = document.getElementById("feedback");

    if (isNaN(g)) {
        fb.textContent = "Enter a number";
        vibrate(30);
        return;
    }

    attempts++;

    const diff = Math.abs(g - targetNumber);
    const close = diff / targetNumber < 0.1;

    if (g === targetNumber) {

        streak++;
        best = Math.max(best, streak);
        localStorage.setItem("best_streak", best);

        addXP(2 + streak);

        fb.textContent = "🔥 Correct!";
        fb.style.color = "#22c55e";

        vibrate([80,40,80]);

        updateStats();
        document.getElementById("nextBtn").style.display = "block";
        return;
    }

    fb.textContent = g < targetNumber ? "📈 Higher" : "📉 Lower";

    if (attempts >= 2) {
        document.getElementById("hint").textContent = hint(targetNumber);
        addXP(1);
    }

    if (close) {
        fb.textContent += " 🔥 VERY CLOSE!";
        vibrate(25);
    } else {
        vibrate(10);
    }
}

/* -------------------------
   GIVE UP
------------------------- */

function giveUp() {
    streak = 0;
    updateStats();

    document.getElementById("feedback").textContent =
        `💀 It was ${targetNumber}`;

    vibrate([120,60,120]);

    document.getElementById("nextBtn").style.display = "block";
}

/* -------------------------
   NEXT
------------------------- */

function nextRound() {
    load();
}

/* -------------------------
   INPUT
------------------------- */

document.getElementById("guess").addEventListener("keydown", e => {
    if (e.key === "Enter") check();
});

/* -------------------------
   START
------------------------- */

window.onload = async function () {
    updateStats();
    await preload();
    await preload();
    load();
};

</script>

</body>
</html>
