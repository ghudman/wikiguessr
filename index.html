<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wikipedia Number Guesser</title>

<style>
body {
    font-family: sans-serif;
    background: #0b0f19;
    color: #e2e8f0;
    height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.game-card {
    background: #1e293b;
    padding: 30px;
    border-radius: 16px;
    max-width: 600px;
    width: 92%;
}

h1 { color: #38bdf8; margin-bottom: 10px; }
h3 { color: #94a3b8; font-weight: 400; }

.clue-box {
    background: #0f172a;
    padding: 18px;
    border-radius: 10px;
    margin: 20px 0;
    text-align: left;
    line-height: 1.6;
}

.blank {
    background: #334155;
    padding: 2px 8px;
    border-radius: 4px;
    color: #fbbf24;
    font-weight: bold;
}

input {
    width: 80%;
    padding: 12px;
    font-size: 1.1rem;
    text-align: center;
    border-radius: 8px;
    border: 2px solid #475569;
    background: #0f172a;
    color: white;
}

button {
    padding: 10px 16px;
    margin: 6px;
    border-radius: 8px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.btn-submit { background: #38bdf8; }
.btn-giveup { background: #ef4444; color: white; }
.btn-next { background: #22c55e; color: white; width: 90%; }

.feedback {
    min-height: 24px;
    margin-top: 10px;
    font-weight: bold;
}

.stats {
    display: flex;
    justify-content: space-around;
    margin-bottom: 10px;
    font-size: 0.9rem;
}
</style>
</head>

<body>

<div class="game-card">
    <h1>📚 Wiki Number Guesser</h1>
    <h3 id="title">Loading...</h3>

    <div class="stats">
        <div>🔥 Streak: <span id="streak">0</span></div>
        <div>🏆 Best: <span id="best">0</span></div>
    </div>

    <div class="clue-box" id="clue">Loading article...</div>

    <input id="guess" type="number" placeholder="Guess the number" />

    <div>
        <button class="btn-submit" onclick="checkGuess()">Submit</button>
        <button class="btn-giveup" onclick="giveUp()">Give Up</button>
    </div>

    <div class="feedback" id="feedback"></div>

    <button class="btn-next" id="next" onclick="loadArticle()" style="display:none;">
        Next Article
    </button>
</div>

<script>
let targetNumber = 0;
let currentText = "";
let streak = 0;
let best = localStorage.getItem("best_streak") || 0;

document.getElementById("best").textContent = best;

function updateStats() {
    document.getElementById("streak").textContent = streak;
    document.getElementById("best").textContent = best;
}

async function fetchWiki() {
    const res = await fetch(
        "https://en.wikipedia.org/api/rest_v1/page/random/summary",
        { cache: "no-store" }
    );
    return await res.json();
}

function extractNumbers(text) {
    return text.match(/\b(18\d{2}|19\d{2}|20\d{2}|\d{2,5})\b/g);
}

async function loadArticle() {
    document.getElementById("feedback").textContent = "";
    document.getElementById("next").style.display = "none";

    let data;
    let numbers;

    document.getElementById("clue").textContent = "Loading...";

    do {
        data = await fetchWiki();
        numbers = extractNumbers(data.extract);
    } while (!numbers || numbers.length === 0);

    targetNumber = parseInt(
        numbers[Math.floor(Math.random() * numbers.length)],
        10
    );

    currentText = data.extract;

    const masked = currentText.replace(
        new RegExp(`\\b${targetNumber}\\b`),
        "<span class='blank'>[ ? ]</span>"
    );

    document.getElementById("title").textContent = data.title;
    document.getElementById("clue").innerHTML = masked;

    document.getElementById("guess").value = "";
}

function checkGuess() {
    const guess = parseInt(document.getElementById("guess").value);
    const feedback = document.getElementById("feedback");

    if (isNaN(guess)) {
        feedback.textContent = "Enter a number!";
        feedback.style.color = "#ef4444";
        return;
    }

    if (guess === targetNumber) {
        streak++;

        if (streak > best) {
            best = streak;
            localStorage.setItem("best_streak", best);
        }

        feedback.textContent = `Correct! It was ${targetNumber}`;
        feedback.style.color = "#22c55e";

        document.getElementById("next").style.display = "block";
        updateStats();
    } else if (guess < targetNumber) {
        feedback.textContent = "Higher 📈";
        feedback.style.color = "#38bdf8";
    } else {
        feedback.textContent = "Lower 📉";
        feedback.style.color = "#f43f5e";
    }
}

function giveUp() {
    streak = 0;
    updateStats();

    document.getElementById("feedback").textContent =
        `It was ${targetNumber}`;

    document.getElementById("feedback").style.color = "#ef4444";

    document.getElementById("next").style.display = "block";
}

window.onload = loadArticle;
</script>

</body>
</html>
